<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Client Onboarding v2 &mdash; Build Base Digitally</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Hind:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0B2545;
  --blue:#1B4079;
  --paper:#F4F6F8;
  --amber:#E8A33D;
  --amber-dark:#C9821F;
  --green:#2E8B57;
  --rust:#A83232;
  --ink:#14213D;
  --grid-line:rgba(27,64,121,0.09);

  --brand:var(--blue);--brand-light:var(--grid-line);--brand-dark:var(--navy);
  --success:var(--green);--warn:var(--amber);--danger:var(--rust);
  --bg:var(--paper);--card:#fff;--text:var(--ink);--muted:#5B6B84;
  --border:rgba(11,37,69,0.12);--radius:14px;--shadow:0 6px 18px rgba(11,37,69,0.07);
}
body{
  font-family:'Hind',sans-serif;
  color:var(--text);
  background-color:var(--bg);
  background-image:
    linear-gradient(var(--grid-line) 1px, transparent 1px),
    linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
  background-size:28px 28px;
  min-height:100vh;padding-bottom:80px;
}
h1,h2,h3,.hdr-logo, .step-pill { font-family:'Baloo 2',sans-serif; }
.code, pre { font-family:'IBM Plex Mono',monospace; }

/* HEADER */
.hdr{
  background:var(--navy);
  background-image:
    linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);
  background-size:26px 26px;
  color:#fff;padding:16px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;
  border-bottom:1px solid rgba(255,255,255,0.1);
}
.hdr-logo{font-family:'Syne',sans-serif;font-size:1.05rem;font-weight:800;letter-spacing:-.5px}
.hdr-logo span{opacity:.6}
.hdr-right{display:flex;align-items:center;gap:10px}
.step-pill{background:rgba(255,255,255,.18);border-radius:20px;padding:4px 13px;font-size:.75rem;font-weight:700}
.workflow-pill{background:rgba(255,255,255,.12);border-radius:20px;padding:4px 13px;font-size:.7rem;color:rgba(255,255,255,.8);display:flex;align-items:center;gap:5px}
.wf-arrow{opacity:.5}

/* PROGRESS */
.prog-wrap{background:#fff;border-bottom:1px solid var(--border);padding:0 20px}
.prog-steps{display:flex;max-width:760px;margin:0 auto}
.p-step{flex:1;display:flex;flex-direction:column;align-items:center;padding:12px 4px;gap:5px;position:relative}
.p-step::after{content:'';position:absolute;top:20px;right:-50%;width:100%;height:2px;background:var(--border);z-index:0}
.p-step:last-child::after{display:none}
.p-dot{width:26px;height:26px;border-radius:50%;border:2px solid var(--border);background:#fff;display:flex;align-items:center;justify-content:center;font-size:.68rem;font-weight:700;color:var(--muted);z-index:1;transition:all .25s}
.p-step.active .p-dot{border-color:var(--brand);background:var(--brand);color:#fff}
.p-step.done .p-dot{border-color:var(--success);background:var(--success);color:#fff}
.p-step.done .p-dot::after{content:'✓';font-size:.72rem}
.p-step.done .p-dot span{display:none}
.p-label{font-size:.62rem;font-weight:700;color:var(--muted);text-align:center;white-space:nowrap;text-transform:uppercase;letter-spacing:.3px}
.p-step.active .p-label{color:var(--brand)}
.p-step.done .p-label{color:var(--success)}

/* MAIN */
.main{max-width:760px;margin:28px auto;padding:0 16px}
.step-panel{display:none}
.step-panel.active{display:block;animation:fadeUp .3s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* CARDS */
.card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow);padding:26px;margin-bottom:18px}
.card-title{font-family:'Syne',sans-serif;font-size:1.15rem;font-weight:800;color:var(--text);margin-bottom:3px;display:flex;align-items:center;gap:8px}
.card-sub{font-size:.8rem;color:var(--muted);margin-bottom:20px;line-height:1.5}
.card-divider{border:none;border-top:1px solid var(--border);margin:18px 0}

/* FORM */
.fr{display:grid;gap:12px;margin-bottom:12px}
.fr.c2{grid-template-columns:1fr 1fr}
.fr.c3{grid-template-columns:1fr 1fr 1fr}
@media(max-width:560px){.fr.c2,.fr.c3{grid-template-columns:1fr}.card{padding:18px 14px}}
.field{display:flex;flex-direction:column;gap:4px}
.field label{font-size:.75rem;font-weight:700;color:var(--text);display:flex;align-items:center;gap:4px;flex-wrap:wrap}
.req{color:var(--brand)}
.hint{font-weight:400;color:var(--muted);font-size:.7rem}
.field input,.field textarea,.field select{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:9px;font-family:'Inter',sans-serif;font-size:.83rem;color:var(--text);background:#fff;transition:border .2s,box-shadow .2s;outline:none}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(91,79,232,.1)}
.field textarea{resize:vertical;min-height:76px}

/* COLOR */
.color-row{display:flex;gap:8px;align-items:center}
.color-row input[type=color]{width:42px;height:36px;padding:2px;border-radius:8px;border:1.5px solid var(--border);cursor:pointer;flex-shrink:0}
.color-row input[type=text]{flex:1}

/* TAG INPUT */
.tag-wrap{display:flex;flex-wrap:wrap;gap:5px;padding:7px 9px;border:1.5px solid var(--border);border-radius:9px;min-height:42px;background:#fff;cursor:text;transition:border .2s,box-shadow .2s}
.tag-wrap:focus-within{border-color:var(--brand);box-shadow:0 0 0 3px rgba(91,79,232,.1)}
.tag{background:var(--brand-light);color:var(--brand);border-radius:5px;padding:2px 7px;font-size:.75rem;font-weight:600;display:flex;align-items:center;gap:3px}
.tag button{background:none;border:none;cursor:pointer;color:var(--brand);font-size:.85rem;line-height:1;padding:0}
.tag-wrap input{border:none;outline:none;flex:1;min-width:110px;font-size:.83rem;font-family:'Inter',sans-serif;background:transparent;padding:1px 3px}

/* TOGGLE GROUP */
.toggle-group{display:flex;gap:0;border:1.5px solid var(--border);border-radius:9px;overflow:hidden}
.toggle-group input[type=radio]{display:none}
.toggle-group label{flex:1;text-align:center;padding:8px 6px;font-size:.75rem;font-weight:600;color:var(--muted);cursor:pointer;border-right:1px solid var(--border);transition:all .2s;background:#fff}
.toggle-group label:last-of-type{border-right:none}
.toggle-group input[type=radio]:checked+label{background:var(--brand);color:#fff;border-color:var(--brand)}

/* SWITCH */
.sw-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}
.sw-row:last-child{border-bottom:none}
.sw-info{}
.sw-info strong{font-size:.82rem;font-weight:700;color:var(--text);display:block}
.sw-info span{font-size:.73rem;color:var(--muted);line-height:1.4}
.sw{position:relative;width:42px;height:24px;flex-shrink:0}
.sw input{opacity:0;width:0;height:0}
.sw-track{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background:var(--border);border-radius:24px;transition:.3s}
.sw-track::before{position:absolute;content:'';height:18px;width:18px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.3s;box-shadow:0 1px 4px rgba(0,0,0,.2)}
.sw input:checked+.sw-track{background:var(--brand)}
.sw input:checked+.sw-track::before{transform:translateX(18px)}

/* RADIO CARDS */
.radio-cards{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.radio-cards.c3{grid-template-columns:1fr 1fr 1fr}
@media(max-width:560px){.radio-cards,.radio-cards.c3{grid-template-columns:1fr}}
.rc input[type=radio]{display:none}
.rc label{display:block;padding:11px 13px;border:1.5px solid var(--border);border-radius:10px;cursor:pointer;transition:all .2s;background:#fff}
.rc input:checked+label{border-color:var(--brand);background:var(--brand-light)}
.rc-title{font-size:.8rem;font-weight:700;color:var(--text);display:flex;align-items:center;gap:5px;margin-bottom:2px}
.rc-desc{font-size:.7rem;color:var(--muted);line-height:1.4}
.badge-free{background:var(--success);color:#fff;border-radius:4px;padding:1px 5px;font-size:.62rem;font-weight:700}
.badge-pro{background:var(--brand);color:#fff;border-radius:4px;padding:1px 5px;font-size:.62rem;font-weight:700}
.badge-rec{background:#8B5CF6;color:#fff;border-radius:4px;padding:1px 5px;font-size:.62rem;font-weight:700}

/* INFO / WARN BOXES */
.info-box{background:var(--brand-light);border-left:3px solid var(--brand);border-radius:0 9px 9px 0;padding:11px 13px;margin-bottom:12px;font-size:.78rem;color:#3730A3;line-height:1.5}
.warn-box{background:#FFFBEB;border-left:3px solid var(--warn);border-radius:0 9px 9px 0;padding:11px 13px;margin-bottom:12px;font-size:.78rem;color:#92400E;line-height:1.5}
.tip-box{background:#F0FDF4;border-left:3px solid var(--success);border-radius:0 9px 9px 0;padding:11px 13px;margin-bottom:12px;font-size:.78rem;color:#166534;line-height:1.5}

/* SECTION LABEL */
.section-label{font-size:.7rem;font-weight:800;text-transform:uppercase;letter-spacing:.8px;color:var(--brand);margin:18px 0 10px;display:flex;align-items:center;gap:6px}
.section-label::after{content:'';flex:1;height:1px;background:var(--border)}

/* NAV */
.nav-row{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-top:6px}
.btn{padding:10px 24px;border-radius:9px;font-family:'Inter',sans-serif;font-weight:700;font-size:.85rem;cursor:pointer;border:none;transition:all .2s;display:flex;align-items:center;gap:6px}
.btn-primary{background:var(--brand);color:#fff}
.btn-primary:hover{background:var(--brand-dark);transform:translateY(-1px)}
.btn-ghost{background:#fff;color:var(--muted);border:1.5px solid var(--border)}
.btn-ghost:hover{border-color:var(--brand);color:var(--brand)}
.btn-success{background:var(--success);color:#fff}
.btn-success:hover{background:#16A34A}
@media(max-width:560px){.nav-row{flex-direction:column-reverse}.btn{width:100%;justify-content:center}}

/* OUTPUT */
.out-card{background:#0F0F1A;border-radius:var(--radius);padding:22px;margin-bottom:18px;position:relative}
.out-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;gap:10px;flex-wrap:wrap}
.out-title{color:#E2E8F0;font-family:'Syne',sans-serif;font-weight:800;font-size:.95rem}
.out-actions{display:flex;gap:8px}
.copy-btn{background:var(--brand);color:#fff;border:none;border-radius:7px;padding:6px 14px;font-size:.75rem;font-weight:700;cursor:pointer;transition:all .2s;font-family:'Inter',sans-serif}
.copy-btn:hover{background:var(--brand-dark)}
.copy-btn.done{background:var(--success)}
.tab-btns{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.tab-btn{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.6);border-radius:6px;padding:5px 12px;font-size:.72rem;font-weight:600;cursor:pointer;transition:all .2s;font-family:'Inter',sans-serif}
.tab-btn.active{background:var(--brand);color:#fff;border-color:var(--brand)}
.prompt-out{color:#A5B4FC;font-family:'Courier New',monospace;font-size:.75rem;line-height:1.75;white-space:pre-wrap;max-height:500px;overflow-y:auto}
.prompt-out::-webkit-scrollbar{width:5px}
.prompt-out::-webkit-scrollbar-track{background:#1E1E2E}
.prompt-out::-webkit-scrollbar-thumb{background:var(--brand);border-radius:3px}

/* SUMMARY */
.sum-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
@media(max-width:560px){.sum-grid{grid-template-columns:1fr 1fr}}
.sum-item{background:var(--bg);border-radius:8px;padding:9px 11px;border:1px solid var(--border)}
.sum-label{font-size:.65rem;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.4px}
.sum-value{font-size:.8rem;font-weight:700;color:var(--text);margin-top:2px;word-break:break-word}
.chip{display:inline-block;width:13px;height:13px;border-radius:3px;vertical-align:middle;margin-right:4px;border:1px solid var(--border)}

/* CHECKLIST */
.chk-list{list-style:none}
.chk-list li{padding:9px 0;border-bottom:1px solid var(--border);font-size:.8rem;display:flex;align-items:flex-start;gap:9px;line-height:1.4}
.chk-list li:last-child{border-bottom:none}
.chk-num{min-width:22px;height:22px;border-radius:50%;background:var(--brand);display:flex;align-items:center;justify-content:center;color:#fff;font-size:.65rem;font-weight:800;flex-shrink:0;margin-top:1px}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-logo">Build Base <span>Digitally</span></div>
  <div class="hdr-right">
    <div class="workflow-pill">Stitch <span class="wf-arrow">&rarr;</span> Antigravity <span class="wf-arrow">&rarr;</span> Novamira <span class="wf-arrow">&rarr;</span> WordPress</div>
    <div class="step-pill" id="stepPill">Step 1 / 6</div>
  </div>
</div>

<div class="prog-wrap">
  <div class="prog-steps">
    <div class="p-step active" id="ps1"><div class="p-dot"><span>1</span></div><div class="p-label">Business</div></div>
    <div class="p-step" id="ps2"><div class="p-dot"><span>2</span></div><div class="p-label">Design</div></div>
    <div class="p-step" id="ps3"><div class="p-dot"><span>3</span></div><div class="p-label">Content</div></div>
    <div class="p-step" id="ps4"><div class="p-dot"><span>4</span></div><div class="p-label">Pages</div></div>
    <div class="p-step" id="ps5"><div class="p-dot"><span>5</span></div><div class="p-label">Tech Setup</div></div>
    <div class="p-step" id="ps6"><div class="p-dot"><span>6</span></div><div class="p-label">Prompt</div></div>
  </div>
</div>

<div class="main">

     STEP 1 &mdash; BUSINESS INFO

<div class="step-panel active" id="step1">
  <div class="card">
    <div class="card-title">📝 Website Content</div>
    <div class="card-sub">Actual content jo website pe jayega &mdash; jitna detail doge utna better Stitch ka output hoga</div>

    <div class="section-label">Services</div>
